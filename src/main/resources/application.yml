spring:
  application:
    name: j-booking


  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

  datasource:
    url: jdbc:postgresql://localhost:5432/j_booking
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: false
  cloud:
    openfeign:
      client:
        config:
          paymentClient:
            url: http://localhost:7070
            connectTimeout: 5000 #ожидание подключения к внешнему сервису
            readTimeout: 15000  #подключен к сервису, время ожидания ответа от сервиса
          notificationClient:
            url: http://217.29.121.129/notification_api
            connectTimeout: 5000
            readTimeout: 15000


# бизнес-параметры бронирования
booking:
  min-nights: 1
  hold-timeout-minutes: 3
  hold-check-interval-ms: 60000
  payment-processing-timeout-minutes: 1
  payment-processing-check-interval-ms: 30000
  batch-size: 100
  cancellation:
    full-refund-hours: 72
    partial-refund-hours: 24
    full-refund-percent: 100
    partial-refund-percent: 50
    no-refund-percent: 0


# курсы валют (сколько сум за 1 единицу валюты)
currency:
  usd-rate: 12000
  rub-rate: 150

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
